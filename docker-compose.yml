services:
  api:
    build: .
    restart: unless-stopped
    environment:
      MEDIA_TMP_DIR: ${MEDIA_TMP_DIR:-/tmp/webbrain-webtools}
      MEDIA_TTL_SECONDS: ${MEDIA_TTL_SECONDS:-1800}
      MAX_CONCURRENT_DOWNLOADS: ${MAX_CONCURRENT_DOWNLOADS:-2}
      MAX_DOWNLOAD_MB: ${MAX_DOWNLOAD_MB:-512}
      DEFAULT_MAX_HEIGHT: ${DEFAULT_MAX_HEIGHT:-720}
      YTDLP_COOKIES_DIR: ${YTDLP_COOKIES_DIR:-/cookies}
      WEBSHARE_PROXY_USERNAME: ${WEBSHARE_PROXY_USERNAME:-}
      WEBSHARE_PROXY_PASSWORD: ${WEBSHARE_PROXY_PASSWORD:-}
      WEBSHARE_FILTER_IP_LOCATIONS: ${WEBSHARE_FILTER_IP_LOCATIONS:-}
      WEBSHARE_RETRIES_WHEN_BLOCKED: ${WEBSHARE_RETRIES_WHEN_BLOCKED:-10}
      WEBSHARE_DOMAIN_NAME: ${WEBSHARE_DOMAIN_NAME:-p.webshare.io}
      WEBSHARE_PROXY_PORT: ${WEBSHARE_PROXY_PORT:-80}
      TRANSCRIPT_PROXY_HTTP_URL: ${TRANSCRIPT_PROXY_HTTP_URL:-}
      TRANSCRIPT_PROXY_HTTPS_URL: ${TRANSCRIPT_PROXY_HTTPS_URL:-}
      YTDLP_PROXY_URL: ${YTDLP_PROXY_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - webbrain-media:/tmp/webbrain-webtools
      - ./cookies:/cookies:ro

volumes:
  webbrain-media:
